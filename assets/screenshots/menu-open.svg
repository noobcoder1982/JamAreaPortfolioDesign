<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#161616;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fca311;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8a000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Left column info panel -->
  <rect x="60" y="60" width="220" height="510" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Left column content -->
  <text x="85" y="110" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">ABHIJEET</text>
  <text x="85" y="135" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">BHUBANESWAR</text>
  <text x="85" y="160" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">ODISHA</text>
  <line x1="85" y1="180" x2="255" y2="180" stroke="#fca311" stroke-width="1" stroke-opacity="0.3"/>
  <text x="85" y="210" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">EDITION</text>
  <text x="85" y="235" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">VOL. 03</text>
  <line x1="85" y1="255" x2="255" y2="255" stroke="#fca311" stroke-width="1" stroke-opacity="0.3"/>
  <text x="85" y="285" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">CONTACT</text>
  <text x="85" y="310" font-family="Arial, sans-serif" font-size="9" fill="#fca311" opacity="0.8" letter-spacing="0.5">portfolio@example.com</text>

  <!-- Right column info panel -->
  <rect x="920" y="60" width="220" height="510" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Right column content -->
  <text x="945" y="110" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1" text-anchor="start">INSTAGRAM</text>
  <text x="945" y="135" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">ARE.NA</text>
  <text x="945" y="160" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">VIMEO</text>
  <line x1="945" y1="180" x2="1115" y2="180" stroke="#fca311" stroke-width="1" stroke-opacity="0.3"/>
  <text x="945" y="210" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">LANGUAGE</text>
  <text x="945" y="235" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">NORSK</text>
  <line x1="945" y1="255" x2="1115" y2="255" stroke="#fca311" stroke-width="1" stroke-opacity="0.3"/>
  <text x="945" y="285" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">CREDITS</text>
  <text x="945" y="310" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.6" letter-spacing="1">IMPRINT</text>

  <!-- Center image placeholder -->
  <rect x="545" y="140" width="110" height="160" rx="6" fill="#fca311" fill-opacity="0.15" stroke="#fca311" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="9" fill="#fca311" opacity="0.7" text-anchor="middle" letter-spacing="1">MENU IMG</text>

  <!-- Bottom big links -->
  <text x="120" y="545" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        fill="#fefff8" letter-spacing="-1" opacity="0.9">INDEX</text>
  <text x="330" y="545" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        fill="#fefff8" letter-spacing="-1" opacity="0.9">PERSONA</text>
  <text x="605" y="545" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        fill="#fefff8" letter-spacing="-1" opacity="0.9">BIOGRAPHY</text>

  <!-- Highlight bar under INDEX -->
  <rect x="120" y="553" width="185" height="5" rx="2.5" fill="url(#accent2)"/>

  <!-- Nav -->
  <text x="80" y="35" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.8" font-weight="700" letter-spacing="1">MENU</text>
  <text x="1045" y="35" font-family="Arial, sans-serif" font-size="11" fill="#fefff8" opacity="0.8" font-weight="700" letter-spacing="1">ARCHIVE</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fca311;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8a000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>

  <!-- Nav bar simulation -->
  <rect x="60" y="40" width="80" height="18" rx="3" fill="#fefff8" fill-opacity="0.9"/>
  <rect x="1060" y="40" width="80" height="18" rx="3" fill="#fefff8" fill-opacity="0.9"/>

  <!-- Hero text "SHAPING IDEAS" -->
  <text x="600" y="290" font-family="Arial Black, sans-serif" font-size="120" font-weight="900"
        fill="#fefff8" text-anchor="middle" letter-spacing="-5" opacity="0.95">SHAPING</text>
  <text x="600" y="400" font-family="Arial Black, sans-serif" font-size="120" font-weight="900"
        fill="#fefff8" text-anchor="middle" letter-spacing="-5" opacity="0.95">IDEAS</text>

  <!-- Accent underline bar -->
  <rect x="200" y="430" width="800" height="8" rx="4" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Bottom menu links hint -->
  <text x="120" y="570" font-family="Arial, sans-serif" font-size="28" font-weight="800"
        fill="#fefff8" letter-spacing="0" opacity="0.5">INDEX</text>
  <text x="300" y="570" font-family="Arial, sans-serif" font-size="28" font-weight="800"
        fill="#fefff8" letter-spacing="0" opacity="0.5">PERSONA</text>
  <text x="530" y="570" font-family="Arial, sans-serif" font-size="28" font-weight="800"
        fill="#fefff8" letter-spacing="0" opacity="0.5">BIOGRAPHY</text>
  <text x="780" y="570" font-family="Arial, sans-serif" font-size="28" font-weight="800"
        fill="#fefff8" letter-spacing="0" opacity="0.5">WORK</text>
  <text x="960" y="570" font-family="Arial, sans-serif" font-size="28" font-weight="800"
        fill="#fefff8" letter-spacing="0" opacity="0.5">JOURNAL</text>

  <!-- Highlight bar under INDEX -->
  <rect x="120" y="575" width="140" height="6" rx="3" fill="url(#accent)"/>

  <!-- Corner decorations -->
  <circle cx="80" cy="580" r="4" fill="#fca311" opacity="0.6"/>
  <circle cx="1120" cy="580" r="4" fill="#fca311" opacity="0.6"/>
</svg>

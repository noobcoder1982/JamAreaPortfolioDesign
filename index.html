<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Area Menu | Codegrid</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap");

:root {
  --dark: #1e1e1e;
  --light: #fefff8;
  --accent: #fca311;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "DM Sans", sans-serif;
  background-color: #000;
  overflow-x: hidden; /* Prevent horizontal scroll */
}

img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h1 {
  text-transform: uppercase;
  font-family: "Anton";
  font-size: 10rem;
  font-weight: 500;
  letter-spacing: -0.1rem;
  line-height: 0.9;
}

p,
a {
  text-decoration: none;
  text-transform: uppercase;
  font-size: 0.8rem;
  font-weight: 600;
  line-height: 1;
  user-select: none;
}

.container {
  position: relative;
  width: 100%;
  height: 100%;
  will-change: transform, opacity;
  z-index: 0;
}

section {
  position: relative;
  width: 100vw;
  height: 100svh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background-color: var(--light);
  color: var(--dark);
  padding: 2rem;
}

.hero h1 {
  width: 70%;
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  padding: 1rem;
  color: var(--light);
  display: flex;
  justify-content: space-between;
  mix-blend-mode: difference;
  z-index: 100;
  pointer-events: none;
}

nav p {
  padding: 1rem;
  cursor: pointer;
  pointer-events: auto;
}

.menu-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100svh;
  overflow: hidden;
  background-color: var(--dark);
  color: var(--light);
  z-index: 3;
  will-change: clip-path;
  /* Start with the menu closed */
  clip-path: polygon(0% 100%, 100% 100%, 100% 100%, 0% 100%);
}

.menu-content {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  padding: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  will-change: transform, opacity;
}

.menu-col:nth-child(2) {
  text-align: right;
}

.menu-img {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150px;
  height: 200px; /* Added height for consistency */
  will-change: transform, opacity;
}

.menu-links-wrapper {
  position: absolute;
  left: 0;
  bottom: 0;
  width: max-content;
  padding: 2rem;
  display: flex;
  justify-content: space-between;
  gap: 2rem;
  will-change: transform;
}

.menu-link {
  position: relative;
  will-change: transform;
  overflow: hidden;
}

.menu-link a {
  position: relative;
  color: var(--light);
  font-family: "Anton";
  font-size: 10rem;
  font-weight: 500;
  letter-spacing: -0.02rem;
  display: inline-block;
  overflow: hidden;
  cursor: pointer; /* Add cursor pointer for links */
}

.menu-link a span:nth-child(2) {
  position: absolute;
  top: 0;
  left: 0;
}

.link-highlighter {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 400px;
  height: 0.75rem;
  background-color: var(--accent);
  will-change: transform, width;
}

.char {
  position: relative;
  display: inline-block;
  will-change: transform;
}
    </style>
</head>
<body>
    <nav>
        <div class="nav-toggle"><p>Menu</p></div>
        <div class="nav-item"><p>Archive</p></div>
    </nav>
    <div class="menu-overlay">
        <div class="menu-content">
            <div class="menu-col">
                <p>Abhijeet</p>
                <p>Bhubaneswar</p>
                <p>Odisha</p>
                <br>
                <p>Edition</p>
                <p>Vol. 03</p>
                <br>
                <p>Contact</p>
                <p>abhijeetpanda21@gmail.com</p>
                <br>
                <p>Direct</p>
                <p>+91 9556081455</p>
            </div>
            <div class="menu-col">
                <p>Instagram</p>
                <p>Are.na</p>
                <p>Vimeo</p>
                <br>
                <p>Language</p>
                <p>Norsk</p>
                <br>
                <p>Credits</p>
                <p>Imprint</p>
                <p>Ref. 00492X</p>
            </div>
        </div>
        <div class="menu-img">
            <!-- Replaced local image with a placeholder -->
            <img src="menu_img.jpg" alt="Abstract orange and dark grey gradient">
        </div>
        <div class="menu-links-wrapper">
            <div class="menu-link">
                <a>
                    <span>Index</span>
                    <span>Index</span>
                </a>
            </div>
            <div class="menu-link">
                <a>
                    <span>Persona</span>
                    <span>Persona</span>
                </a>
            </div>
            <div class="menu-link">
                <a>
                    <span>Biography</span>
                    <span>Biography</span>
                </a>
            </div>
            <div class="menu-link">
                <a>
                    <span>Work</span>
                    <span>Work</span>
                </a>
            </div>
            <div class="menu-link">
                <a>
                    <span>Journal</span>
                    <span>Journal</span>
                </a>
            </div>
            <div class="link-highlighter"></div>
        </div>
    </div>
    <div class="container">
        <section class="hero">
            <h1>Shaping Ideas</h1>
        </section>
    </div>

    <!-- Added GSAP and SplitText from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://assets.codepen.io/16327/SplitText3.min.js"></script>
    <script>
// The import statements were removed as GSAP is now loaded from the CDN.

document.addEventListener("DOMContentLoaded", () => {
  gsap.registerPlugin(SplitText);

  const container = document.querySelector(".container");
  const navToggle = document.querySelector(".nav-toggle");
  const menuOverlay = document.querySelector(".menu-overlay");
  const menuContent = document.querySelector(".menu-content");
  const menuImage = document.querySelector(".menu-img");
  const menuLinksWrapper = document.querySelector(".menu-links-wrapper");
  const linkHighlighter = document.querySelector(".link-highlighter");

  let currentX = 0;
  let targetX = 0;
  let lerpFactor = 0.05;

  let currentHighlighterX = 0;
  let targetHighlighterX = 0;
  let currentHighlighterWidth = 0;
  let targetHighlighterWidth = 0;

  let isMenuOpen = false;
  let isMenuAnimating = false;

  const menuLinks = document.querySelectorAll(".menu-link a");

  // Prepare text animations
  menuLinks.forEach((link) => {
    const chars = link.querySelectorAll("span");

    chars.forEach((char, charIndex) => {
      const split = new SplitText(char, { type: "chars" });

      split.chars.forEach((char) => {
        char.classList.add("char");
      });

      if (charIndex === 1) {
        gsap.set(split.chars, { y: "110%" });
      }
    });
  });

  // Set initial menu state
  gsap.set(menuContent, { y: "50%", opacity: 0.25 });
  gsap.set(menuImage, { scale: 0.5, opacity: 0.25 });
  gsap.set(menuLinks, { y: "150%" });
  gsap.set(linkHighlighter, { y: "150%" });

  const defaultLinkText = document.querySelector(
    ".menu-link:first-child a span"
  );

  if (defaultLinkText) {
    const linkWidth = defaultLinkText.offsetWidth;
    linkHighlighter.style.width = linkWidth + "px";
    targetHighlighterWidth = linkWidth;
  }

  const defaultLinkTextElement = document.querySelector(".menu-link:first-child");

  if (defaultLinkTextElement) {
    const linkRect = defaultLinkTextElement.getBoundingClientRect();
    const menuWrapperRect = menuLinksWrapper.getBoundingClientRect();

    const initialX = linkRect.left - menuWrapperRect.left;

    currentHighlighterX = initialX;
    targetHighlighterX = initialX;
  }

  function toggleMenu() {
    if (isMenuAnimating) return;
    isMenuAnimating = true;

    if (!isMenuOpen) {
      // Open Menu Animation
      gsap.to(container, {
        y: "-40%",
        opacity: 0.25,
        duration: 1.25,
        ease: "expo.out",
      });

      gsap.to(menuOverlay, {
        clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
        duration: 1.25,
        ease: "expo.out",
        onComplete: () => {
          gsap.set(container, { y: "40%" });
          gsap.set(".menu-link", { overflow: "visible" });

          isMenuOpen = true;
          isMenuAnimating = false;
        },
      });

      gsap.to(menuContent, {
        y: "0%",
        opacity: 1,
        duration: 1.5,
        ease: "expo.out",
      });

      gsap.to(menuImage, {
        scale: 1,
        opacity: 1,
        duration: 1.5,
        ease: "expo.out",
      });

      gsap.to(menuLinks, {
        y: "0%",
        duration: 1.25,
        stagger: 0.1,
        delay: 0.25,
        ease: "expo.out",
      });

      gsap.to(linkHighlighter, {
        y: "0%",
        duration: 1,
        delay: 1,
        ease: "expo.out",
      });
    } else {
      // Close Menu Animation
      gsap.to(container, {
        y: "0%",
        opacity: 1,
        duration: 1.25,
        ease: "expo.out",
      });

      gsap.to(menuLinks, {
        y: "-200%",
        duration: 1.25,
        ease: "expo.out",
      });

      gsap.to(menuContent, {
        y: "-100%",
        opacity: 0.25,
        duration: 1.25,
        ease: "expo.out",
      });

      gsap.to(menuImage, {
        y: "-100%",
        opacity: 0.5,
        scale: 0.5,
        duration: 1.25,
        ease: "expo.out",
      });

      gsap.to(menuOverlay, {
        clipPath: "polygon(0% 100%, 100% 100%, 100% 100%, 0% 100%)",
        duration: 1.25,
        ease: "expo.out",
        onComplete: () => {
          // Reset elements to their initial state after closing
          gsap.set(menuLinks, { y: "150%" });
          gsap.set(linkHighlighter, { y: "150%" });
          gsap.set(menuContent, { y: "50%", opacity: 0.25 });
          gsap.set(menuImage, { y: "0%", scale: 0.5, opacity: 0.25 });
          gsap.set(".menu-link", { overflow: "hidden" });

          gsap.set(menuLinksWrapper, { x: 0 });
          currentX = 0;
          targetX = 0;

          isMenuOpen = false;
          isMenuAnimating = false;
        },
      });
    }
  }

  navToggle.addEventListener("click", toggleMenu);

  const menuLinkContainers = document.querySelectorAll(".menu-link");

  // Handle hover effect on menu links
  menuLinkContainers.forEach((link) => {
    link.addEventListener("mouseenter", () => {
      if (window.innerWidth < 1000) return;

      const linkCopy = link.querySelectorAll("a span");
      const visibleCopy = linkCopy[0];
      const animatedCopy = linkCopy[1];

      const visibleChars = visibleCopy.querySelectorAll(".char");
      gsap.to(visibleChars, {
        y: "-110%",
        stagger: 0.03,
        duration: 0.5,
        ease: "expo.inOut",
      });

      const animatedChars = animatedCopy.querySelectorAll(".char");
      gsap.to(animatedChars, {
        y: "0%",
        stagger: 0.03,
        duration: 0.5,
        ease: "expo.inOut",
      });
    });

    link.addEventListener("mouseleave", () => {
      if (window.innerWidth < 1000) return;

      const linkCopy = link.querySelectorAll("a span");
      const visibleCopy = linkCopy[0];
      const animatedCopy = linkCopy[1];

      const animatedChars = animatedCopy.querySelectorAll(".char");
      gsap.to(animatedChars, {
        y: "110%",
        stagger: 0.03,
        duration: 0.5,
        ease: "expo.inOut",
      });

      const visibleChars = visibleCopy.querySelectorAll(".char");
      gsap.to(visibleChars, {
        y: "0%",
        stagger: 0.03,
        duration: 0.5,
        ease: "expo.inOut",
      });
    });
  });

  // Handle horizontal scrolling of links with mouse movement
  menuOverlay.addEventListener("mousemove", (e) => {
    if (window.innerWidth < 1000) return;

    const mouseX = e.clientX;
    const viewportWidth = window.innerWidth;
    const menuLinksWrapperWidth = menuLinksWrapper.offsetWidth;

    const maxMoveLeft = 0;
    const maxMoveRight = viewportWidth - menuLinksWrapperWidth;

    const sensitivityRange = viewportWidth * 0.5;
    const startX = (viewportWidth - sensitivityRange) / 2;
    const endX = startX + sensitivityRange;

    let mousePercentage;

    if (mouseX <= startX) {
      mousePercentage = 0;
    } else if (mouseX >= endX) {
      mousePercentage = 1;
    } else {
      mousePercentage = (mouseX - startX) / sensitivityRange;
    }

    targetX = maxMoveLeft + mousePercentage * (maxMoveRight - maxMoveLeft);
  });
  
  // Handle moving the highlighter under the hovered link
  menuLinkContainers.forEach((link) => {
    link.addEventListener("mouseenter", () => {
      if (window.innerWidth < 1000) return;

      const linkRect = link.getBoundingClientRect();
      const menuWrapperRect = menuLinksWrapper.getBoundingClientRect();
      targetHighlighterX = linkRect.left - menuWrapperRect.left;

      const linkCopyElement = link.querySelector("a span");
      targetHighlighterWidth = linkCopyElement
        ? linkCopyElement.offsetWidth
        : link.offsetWidth;
    });
  });

  menuLinksWrapper.addEventListener("mouseleave", () => {
    const defaultLinkText = document.querySelector(
      ".menu-link:first-child"
    );
    const defaultLinkTextSpan = defaultLinkText.querySelector("a span");
    const linkRect = defaultLinkText.getBoundingClientRect();
    const menuWrapperRect = menuLinksWrapper.getBoundingClientRect();
    targetHighlighterX = linkRect.left - menuWrapperRect.left;
    targetHighlighterWidth = defaultLinkTextSpan.offsetWidth;
  });

  // Animation loop for smooth movement (lerping)
  function animate() {
    currentX += (targetX - currentX) * lerpFactor;
    currentHighlighterX +=
      (targetHighlighterX - currentHighlighterX) * lerpFactor;
    currentHighlighterWidth +=
      (targetHighlighterWidth - currentHighlighterWidth) * lerpFactor;

    gsap.to(menuLinksWrapper, {
      x: currentX,
      duration: 0.3,
      ease: "power4.out",
    });

    gsap.to(linkHighlighter, {
      x: currentHighlighterX,
      width: currentHighlighterWidth,
      duration: 0.3,
      ease: "power4.out",
    });

    requestAnimationFrame(animate);
  }

  animate();
});
    </script>
</body>
</html>
